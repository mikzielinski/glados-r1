<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>OKO · Feedback</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{ margin:0; background:radial-gradient(120% 120% at 50% 20%, #0c0d10, #040405 70%); color:var(--text-primary); font-family:var(--font-ui); }
  .wrap{ padding:26px 20px; display:flex; align-items:flex-start; justify-content:space-around; gap:8px; flex-wrap:wrap; }
  .waves{ display:flex; flex-direction:column; align-items:center; gap:14px; padding-top:24px; }
  .seclabel{ font-family:var(--font-data); font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--text-muted); }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script type="text/babel">
  const { Lens, Waveform } = window.OKODesignSystem_f53d78;
  function Demo(){
    return (
      <React.Fragment>
        <Lens state="idle" size={120} label="GOTOWA" />
        <Lens state="listening" size={120} label="NASŁUCHUJĘ" />
        <Lens state="thinking" size={120} label="PRZETWARZAM" />
        <Lens state="speaking" size={120} amplitude={0.85} label="MÓWIĘ" />
        <div className="waves">
          <Waveform active height={46} bars={20} />
          <span className="seclabel">Aktywność głosu</span>
          <Lens state="offline" size={64} label="OFFLINE" />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
