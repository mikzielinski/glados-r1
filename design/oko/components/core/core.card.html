<!-- @dsCard group="Components" viewport="700x460" name="Core — Buttons, Status, Cards" subtitle="Button / IconButton / StatusChip / Card" -->
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKO · Core</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{ margin:0; background:var(--bg); color:var(--text-primary); font-family:var(--font-ui); }
  .wrap{ padding:24px 28px; display:flex; flex-direction:column; gap:22px; }
  .row{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .seclabel{ font-family:var(--font-data); font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }
  .col{ display:flex; flex-direction:column; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script type="text/babel">
  const { Button, IconButton, StatusChip, Card } = window.OKODesignSystem_f53d78;
  const I = (n) => <i data-lucide={n}></i>;
  function Demo(){
    return (
      <React.Fragment>
        <div className="col">
          <div className="seclabel">Button — primary · secondary · ghost</div>
          <div className="row">
            <Button variant="primary" icon={I('check')}>Potwierdź</Button>
            <Button variant="secondary" icon={I('x')}>Anuluj</Button>
            <Button variant="ghost">Pomiń</Button>
            <Button variant="primary" loading>Wykonuję</Button>
            <Button variant="primary" disabled>Zablokowane</Button>
          </div>
        </div>
        <div className="col">
          <div className="seclabel">IconButton — ghost · outline · solid</div>
          <div className="row">
            <IconButton label="Menu">{I('menu')}</IconButton>
            <IconButton variant="outline" label="Ustawienia">{I('settings')}</IconButton>
            <IconButton variant="solid" shape="circle" size="lg" label="Mów">{I('mic')}</IconButton>
            <IconButton variant="outline" shape="circle" label="Zamknij">{I('x')}</IconButton>
          </div>
        </div>
        <div className="col">
          <div className="seclabel">StatusChip</div>
          <div className="row">
            <StatusChip tone="ok" pulse>ONLINE</StatusChip>
            <StatusChip tone="warn" solid>UWAGA</StatusChip>
            <StatusChip tone="danger" solid pulse>BŁĄD</StatusChip>
            <StatusChip tone="info">SYNCHRONIZACJA</StatusChip>
            <StatusChip tone="neutral" dot={false}>v1.4.0</StatusChip>
          </div>
        </div>
        <Card label="TELEMETRIA" actions={<StatusChip tone="ok" pulse>NOMINALNE</StatusChip>} style={{maxWidth:380}}>
          <div style={{fontFamily:'var(--font-mono)', fontSize:13, color:'var(--text-secondary)', lineHeight:1.7}}>
            CPU 12% · PAMIĘĆ 318MB<br/>CZUJNIKI 6/6 · ŁĄCZE LTE
          </div>
        </Card>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
