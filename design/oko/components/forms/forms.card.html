<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>OKO · Forms</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{ margin:0; background:var(--bg); color:var(--text-primary); font-family:var(--font-ui); }
  .wrap{ padding:26px 28px; display:grid; grid-template-columns:1fr 1fr; gap:30px; align-items:start; }
  .stack{ display:flex; flex-direction:column; gap:16px; }
  .seclabel{ font-family:var(--font-data); font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-muted); margin-bottom:4px; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script type="text/babel">
  const { Field, Toggle } = window.OKODesignSystem_f53d78;
  const I = (n) => <i data-lucide={n}></i>;
  function Demo(){
    return (
      <React.Fragment>
        <div className="stack">
          <div className="seclabel">Field</div>
          <Field label="ZAPYTANIE" icon={I('search')} placeholder="Wpisz polecenie…" />
          <Field label="IDENTYFIKATOR" defaultValue="OKO-9000" />
          <Field label="KLUCZ API" error hint="Nieprawidłowy klucz dostępu." defaultValue="sk-••••••••" />
        </div>
        <div className="stack">
          <div className="seclabel">Toggle</div>
          <Toggle label="Tryb proaktywny" sublabel="OKO MOŻE ODEZWAĆ SIĘ PIERWSZE" defaultChecked />
          <Toggle label="Mikrofon zawsze aktywny" sublabel="NASŁUCH CIĄGŁY" />
          <Toggle label="Scanlines CRT" sublabel="EFEKT WIZUALNY" defaultChecked />
          <Toggle label="Zablokowane" sublabel="WYMAGA UPRAWNIEŃ" disabled />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
