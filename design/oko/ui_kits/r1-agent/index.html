<!-- @dsCard group="R1 Agent" viewport="640x720" name="R1 Agent — interactive" subtitle="OKO on the Rabbit R1: boot, idle, voice, tasks, settings" -->
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKO · R1 Agent</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{ margin:0; min-height:100%; background:
    radial-gradient(80% 60% at 50% 0%, #16100c 0%, #070708 55%, #040405 100%);
    color:var(--text-primary); font-family:var(--font-ui); }
  .stage{ min-height:100vh; display:flex; flex-direction:column; align-items:center; gap:24px; padding:40px 20px 56px; }
  .head{ display:flex; align-items:center; gap:12px; }
  .head img{ display:block; }
  .head .sub{ font-family:var(--font-mono); font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--text-muted); }
  .navchip{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase;
    padding:7px 13px; border-radius:var(--radius-pill); cursor:pointer; color:var(--text-secondary);
    background:rgba(244,244,242,0.04); border:1px solid var(--border);
    transition:all var(--dur-fast) var(--ease-hal); }
  .navchip:hover{ color:var(--text-primary); border-color:var(--line-3); }
  .navchip.on{ color:#fff; background:var(--red-500); border-color:var(--red-500); box-shadow:var(--glow-sm); }
  .navchip.alert{ color:var(--red-core); border-color:var(--red-700); }
  .navchip.alert:hover{ background:var(--red-tint); }
  @keyframes okoNotifIn{ from{ transform:translateY(14px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  *::-webkit-scrollbar{ width:5px; height:5px; }
  *::-webkit-scrollbar-thumb{ background:var(--line-2); border-radius:3px; }
</style>
</head>
<body>
<div class="stage">
  <div class="head">
    <img src="../../assets/oko-wordmark.svg" width="120" height="36" alt="OKO">
    <span class="sub">// agent r1</span>
  </div>
  <div id="app"></div>
</div>
<script type="text/babel" src="Shared.jsx"></script>
<script type="text/babel" src="DeviceFrame.jsx"></script>
<script type="text/babel" src="LensScreens.jsx"></script>
<script type="text/babel" src="ConversationScreen.jsx"></script>
<script type="text/babel" src="TaskScreen.jsx"></script>
<script type="text/babel" src="SettingsScreen.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
</body>
</html>
