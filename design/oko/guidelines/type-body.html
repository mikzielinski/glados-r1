<!DOCTYPE html>
<html lang="pl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--text-primary);font-family:var(--font-grotesk);}
  .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:14px;max-width:620px;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.04em;margin-bottom:2px;}
  .body{font-size:var(--fs-body);line-height:var(--lh-body);color:var(--clinical-100);text-wrap:pretty;}
  .sm{font-size:var(--fs-sm);line-height:1.5;color:var(--text-secondary);}
</style></head>
<body><div class="wrap">
  <div>
    <div class="tag">body · 15/1.5</div>
    <p class="body" style="margin:0">Zauważyłam, że pijesz czwartą kawę. Nie oceniam — to maszyna, którą poganiasz, a nie ja. Zamówić piątą?</p>
  </div>
  <div>
    <div class="tag">sm · 13/1.5 — secondary</div>
    <p class="sm" style="margin:0">Pomocniczy tekst, podpisy, metadane wiadomości i wszystko, co nie jest głównym głosem agenta.</p>
  </div>
</div></body></html>
