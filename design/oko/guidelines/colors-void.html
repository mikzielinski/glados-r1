<!-- @dsCard group="Colors" viewport="700x190" name="Void & Panels" subtitle="HAL darkness — the matte ground everything sits on" -->
<!DOCTYPE html>
<html lang="pl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--text-primary);font-family:var(--font-ui);}
  .wrap{padding:22px 24px;}
  .row{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px 10px;}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;line-height:1.5;}
  .meta b{display:block;color:var(--text-secondary);font-weight:400;}
  .meta span{color:var(--text-muted);}
</style></head>
<body><div class="wrap"><div class="row">
  <div class="sw" style="background:var(--void-900)"><div class="meta"><b>void-900</b><span>#040405</span></div></div>
  <div class="sw" style="background:var(--void-800)"><div class="meta"><b>void-800</b><span>#08090b</span></div></div>
  <div class="sw" style="background:var(--void-700)"><div class="meta"><b>void-700</b><span>#0d0e11</span></div></div>
  <div class="sw" style="background:var(--panel-900)"><div class="meta"><b>panel-900</b><span>#0f1014</span></div></div>
  <div class="sw" style="background:var(--panel-800)"><div class="meta"><b>panel-800</b><span>#15171c</span></div></div>
  <div class="sw" style="background:var(--panel-700)"><div class="meta"><b>panel-700</b><span>#1c1f25</span></div></div>
  <div class="sw" style="background:var(--panel-600)"><div class="meta"><b>panel-600</b><span>#262a31</span></div></div>
</div></div></body></html>
