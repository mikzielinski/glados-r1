<!-- @dsCard group="Type" viewport="700x150" name="Clinical labels" subtitle="Uppercase mono, wide tracking — GLaDOS panel signage" -->
<!DOCTYPE html>
<html lang="pl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--text-primary);font-family:var(--font-mono);}
  .wrap{padding:24px 26px;display:flex;flex-wrap:wrap;gap:14px 28px;align-items:center;}
  .lbl{font-family:var(--font-mono);font-size:var(--fs-label);letter-spacing:var(--track-label);text-transform:uppercase;color:var(--text-muted);}
  .lbl.on{color:var(--text-secondary);}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--clinical-700);width:100%;letter-spacing:.04em;}
</style></head>
<body><div class="wrap">
  <span class="tag">label · 10.5 / 0.2em tracking / uppercase</span>
  <span class="lbl on">NASŁUCHUJĘ</span>
  <span class="lbl on">TELEMETRIA</span>
  <span class="lbl">ZADANIE 03 / 05</span>
  <span class="lbl">UPRAWNIENIA</span>
  <span class="lbl on">SYSTEM</span>
  <span class="lbl">PROTOKÓŁ OKO-9000</span>
</div></body></html>
