<!-- @dsCard group="Colors" viewport="700x190" name="Clinical whites" subtitle="GLaDOS off-white — text & labels, never pure #fff" -->
<!DOCTYPE html>
<html lang="pl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--text-primary);font-family:var(--font-ui);}
  .wrap{padding:22px 24px;}
  .row{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px 10px;}
  .meta{font-family:var(--font-mono);font-size:9.5px;line-height:1.5;color:#111;}
  .meta b{display:block;font-weight:400;}
  .dark{color:var(--text-secondary)!important;}
</style></head>
<body><div class="wrap"><div class="row">
  <div class="sw" style="background:var(--clinical-50)"><div class="meta"><b>clinical-50 ★</b>#f6f6f3</div></div>
  <div class="sw" style="background:var(--clinical-100)"><div class="meta"><b>clinical-100</b>#e8e8e3</div></div>
  <div class="sw" style="background:var(--clinical-300)"><div class="meta"><b>clinical-300</b>#b6b8b3</div></div>
  <div class="sw" style="background:var(--clinical-500)"><div class="meta dark"><b>clinical-500</b>#7e817b</div></div>
  <div class="sw" style="background:var(--clinical-700)"><div class="meta dark"><b>clinical-700</b>#4a4d49</div></div>
</div></div></body></html>
