<!-- @dsCard group="Type" viewport="700x240" name="Display & Headings" subtitle="Space Grotesk — clinical, slightly uncanny" -->
<!DOCTYPE html>
<html lang="pl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--text-primary);font-family:var(--font-grotesk);}
  .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:14px;}
  .line{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--border);padding-bottom:12px;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:120px;flex:0 0 auto;letter-spacing:.04em;}
  .d{font-size:var(--fs-display);font-weight:700;letter-spacing:var(--track-tight);line-height:1;}
  .h1{font-size:var(--fs-h1);font-weight:700;letter-spacing:var(--track-tight);}
  .h2{font-size:var(--fs-h2);font-weight:500;}
  .h3{font-size:var(--fs-h3);font-weight:500;}
</style></head>
<body><div class="wrap">
  <div class="line"><span class="tag">display · 44/700</span><span class="d">Otworzyłam drzwi.</span></div>
  <div class="line"><span class="tag">h1 · 30/700</span><span class="h1">Witaj z powrotem.</span></div>
  <div class="line"><span class="tag">h2 · 22/500</span><span class="h2">Czego potrzebujesz?</span></div>
  <div class="line" style="border:none"><span class="tag">h3 · 17/500</span><span class="h3">Mam kilka sugestii, których nie zignorujesz.</span></div>
</div></body></html>
