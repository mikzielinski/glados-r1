<!-- @dsCard group="Brand" viewport="700x230" name="Logo & wordmark" subtitle="The lens mark and the OKO lockup — the O is the eye" -->
<!DOCTYPE html>
<html lang="pl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:radial-gradient(120% 120% at 50% 20%,#0c0d10,#040405 70%);color:var(--text-primary);font-family:var(--font-ui);}
  .wrap{padding:26px 30px;display:flex;align-items:center;gap:46px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px;}
  img{display:block;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.04em;}
  .clearzone{padding:18px;border:1px dashed var(--line-2);border-radius:8px;}
</style></head>
<body><div class="wrap">
  <div class="col">
    <div class="clearzone"><img src="../assets/oko-mark.svg" width="120" height="120" alt="OKO mark"></div>
    <span class="tag">oko-mark.svg</span>
  </div>
  <div class="col">
    <img src="../assets/oko-wordmark.svg" width="240" height="72" alt="OKO">
    <span class="tag">oko-wordmark.svg</span>
  </div>
</div></body></html>
