<!-- @dsCard group="Brand" viewport="700x260" name="Lens anatomy" subtitle="Housing → ring → lens → hot core → catchlight" -->
<!DOCTYPE html>
<html lang="pl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:radial-gradient(120% 120% at 50% 20%,#0c0d10,#040405 70%);color:var(--text-primary);font-family:var(--font-ui);}
  .wrap{padding:24px;display:flex;align-items:center;justify-content:center;gap:54px;}
  .stage{position:relative;width:180px;height:180px;}
  .housing{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 38%,#15171c,#08090b 70%,#040405);box-shadow:inset 0 2px 6px rgba(0,0,0,.8),inset 0 0 0 1px rgba(244,244,242,.05);}
  .lens{position:absolute;inset:24px;border-radius:50%;background:var(--lens-gradient);box-shadow:var(--glow-md);}
  .core{position:absolute;top:40%;left:50%;width:42px;height:42px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle at 50% 45%,#fff4ef,#ff6a4d 45%,transparent);}
  .catch{position:absolute;top:30%;left:34%;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.6);filter:blur(1px);}
  .legend{font-family:var(--font-mono);font-size:11px;line-height:2;color:var(--text-secondary);letter-spacing:.04em;}
  .legend b{color:var(--text-primary);font-weight:400;}
  .legend .k{color:var(--red-core);}
</style></head>
<body><div class="wrap">
  <div class="stage">
    <div class="housing"></div>
    <div class="lens"><div class="core"></div><div class="catch"></div></div>
  </div>
  <div class="legend">
    <div><span class="k">01</span> &nbsp;<b>Obudowa</b> — matowy metal, void-800</div>
    <div><span class="k">02</span> &nbsp;<b>Soczewka</b> — gradient radialny, jedyne źródło światła</div>
    <div><span class="k">03</span> &nbsp;<b>Gorące jądro</b> — źrenica; skaluje się przy mowie</div>
    <div><span class="k">04</span> &nbsp;<b>Refleks</b> — pojedynczy błysk, lewy górny</div>
    <div><span class="k">05</span> &nbsp;<b>Poświata</b> — emisja tylko na czerwieni</div>
  </div>
</div></body></html>
